services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - DB_PATH=/app/data/app.db
    depends_on:
      - qdrant
    volumes:
      - sqlite_data:/app/data

volumes:
  qdrant_data:
  sqlite_data:

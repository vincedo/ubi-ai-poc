<div class="input-area">
  <!-- Media chips -->
  @if (selectedMedia().length > 0) {
    <div class="media-chips" aria-label="Selected media">
      @for (media of selectedMedia(); track media.id) {
        <span class="media-chip" [attr.aria-label]="media.title">
          {{ media.type === 'unknown' ? 'Unknown media' : media.title }}
          @if (!attachmentLocked()) {
            <button
              class="chip-remove"
              (click)="removeMedia(media.id)"
              aria-label="Remove {{ media.title }}"
            >
              ×
            </button>
          }
        </span>
      }
    </div>
  }

  <div class="input-wrapper">
    <!-- Attachment button -->
    <button
      class="attach-btn"
      [class.locked]="!canAttach()"
      [disabled]="!canAttach()"
      [matTooltip]="
        attachmentLocked()
          ? 'Media selection is locked for this session'
          : !chatService.selectedChatPresetId()
            ? 'Select a preset first'
            : 'Attach media'
      "
      (click)="togglePopover()"
      aria-label="Attach media"
    >
      <span class="material-symbols-outlined">attach_file</span>
    </button>

    <label for="chat-input" class="sr-only">Ask a question about your media</label>
    <textarea
      #textarea
      id="chat-input"
      class="chat-textarea"
      placeholder="Ask a question about your media…"
      rows="1"
      (keydown)="onKeydown($event, textarea)"
    ></textarea>

    <div class="input-actions">
      @if (chatService.isStreaming()) {
        <button class="stop-btn" title="Stop generating" (click)="chatService.stop()">
          <span class="material-symbols-outlined">stop_circle</span>
        </button>
      }
      <button class="send-btn" [disabled]="chatService.isStreaming()" (click)="send(textarea)">
        <span class="material-symbols-outlined">send</span>
      </button>
    </div>
  </div>

  <!-- Attachment popover -->
  @if (popoverOpen()) {
    <div class="attach-popover" (keydown.escape)="closePopover()">
      <app-media-tree
        [courseTree]="courseService.tree()"
        [loading]="courseService.treeLoading()"
        selectionMode="checkboxes"
        title="Select Media"
        [(selectedMediaIds)]="chatService.individualMediaIds"
      />
    </div>
    <div class="popover-backdrop" (click)="closePopover()"></div>
  }

  <div class="input-footer">
<div class="preset-picker">
      <select
        class="preset-select"
        [attr.disabled]="attachmentLocked() || chatService.isStreaming() ? true : null"
        [value]="chatService.selectedChatPresetId()"
        (change)="onPresetChange($event)"
        aria-label="Select chat preset"
      >
        <option value="" disabled [selected]="!chatService.selectedChatPresetId()">
          Select a preset…
        </option>
        @for (preset of presetService.chatPresets(); track preset.id) {
          <option
            [value]="preset.id"
            [attr.disabled]="preset.ingestionStatus !== 'done' ? true : null"
          >
            {{ preset.name }}
            @if (preset.ingestionStatus !== 'done') {
              (not ingested)
            }
          </option>
        }
      </select>
    </div>
  </div>
</div>

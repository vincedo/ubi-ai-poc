<div class="chat-layout">

    class="scope-panel"
    [courseTree]="courseService.tree()"
    selectionMode="checkboxes"
    title="Scope"
    [(selectedMediaIds)]="chatService.individualMediaIds"
  />

    <app-message-thread class="message-thread" />
    <app-chat-input class="chat-input" />
  </section>
</div>
